<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar border-bottom px-3">
    <span class="navbar-brand">Organizador de Tarefas</span>
    <div class="d-flex gap-3">
      <a href="index.html" class="nav-link" data-page="index.html">Quadro</a>
      <a href="usuarios.html" class="nav-link" data-page="usuarios.html">Usuários</a>
      <a href="tarefas.html" class="btn btn-sm btn-primary" data-page="tarefas.html">+ Nova Tarefa</a>
    </div>
  </nav>

  <div class="container-fluid p-4">
    <div class="row g-3">

      <div class="col-md-4">
        <div class="border rounded p-3">
          <h6 class="mb-3">A Fazer <span class="badge bg-secondary ms-1" id="count-a_fazer">0</span></h6>
          <div id="col-a_fazer"></div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="border rounded p-3">
          <h6 class="mb-3">Fazendo <span class="badge bg-secondary ms-1" id="count-fazendo">0</span></h6>
          <div id="col-fazendo"></div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="border rounded p-3">
          <h6 class="mb-3">Pronto <span class="badge bg-secondary ms-1" id="count-pronto">0</span></h6>
          <div id="col-pronto"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Modal Edição -->
  <div class="modal fade" id="modalEdicao" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Editar Tarefa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="formEdicao">
          <div class="modal-body">
            <input type="hidden" id="edit-id">
            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <select id="edit-usuario" class="form-select" required></select>
            </div>
            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <textarea id="edit-descricao" class="form-control" rows="3" required></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Setor</label>
              <input type="text" id="edit-setor" class="form-control" required>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Prioridade</label>
                <select id="edit-prioridade" class="form-select" required>
                  <option value="baixa">Baixa</option>
                  <option value="media">Média</option>
                  <option value="alta">Alta</option>
                </select>
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Status</label>
                <select id="edit-status" class="form-select" required>
                  <option value="a_fazer">A Fazer</option>
                  <option value="fazendo">Fazendo</option>
                  <option value="pronto">Pronto</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Confirmação -->
  <div class="modal fade" id="modalConfirm" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Excluir Tarefa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="mb-1 text-muted small">Deseja remover:</p>
          <p class="fw-semibold mb-0" id="confirm-desc"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger btn-sm" id="btnConfirmarExclusao">Remover</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/kanban.js"></script>
</body>
</html>
