<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar border-bottom px-3">
    <a class="navbar-brand" href="index.html">Organizador de Tarefas</a>
    <div class="d-flex gap-3">
      <a href="index.html" class="nav-link" data-page="index.html">Quadro</a>
      <a href="usuarios.html" class="nav-link" data-page="usuarios.html">Usuários</a>
      <a href="tarefas.html" class="btn btn-sm btn-primary" data-page="tarefas.html">+ Nova Tarefa</a>
    </div>
  </nav>

  <div class="container p-4" style="max-width:500px">
    <div class="border rounded p-3">
      <h6 class="mb-3">Nova Tarefa</h6>

      <form id="formTarefa" novalidate>

        <div class="mb-3">
          <label for="id_usuario" class="form-label">Usuário Responsável</label>
          <select id="id_usuario" class="form-select" required>
            <option value="">Carregando...</option>
          </select>
          <div class="form-text"><a href="usuarios.html">Cadastrar novo usuário</a></div>
        </div>

        <div class="mb-3">
          <label for="descricao" class="form-label">Descrição</label>
          <textarea id="descricao" class="form-control" rows="3" required></textarea>
        </div>

        <div class="mb-3">
          <label for="setor" class="form-label">Setor</label>
          <input type="text" id="setor" class="form-control" required>
        </div>

        <div class="mb-4">
          <label for="prioridade" class="form-label">Prioridade</label>
          <select id="prioridade" class="form-select" required>
            <option value="">Selecione...</option>
            <option value="baixa">🟢 Baixa</option>
            <option value="media">🟡 Média</option>
            <option value="alta">🔴 Alta</option>
          </select>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1">Cadastrar Tarefa</button>
          <a href="index.html" class="btn btn-outline-secondary">Voltar</a>
        </div>

      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/tarefas.js"></script>
</body>
</html>
