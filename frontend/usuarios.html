<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizador de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar border-bottom px-3">
    <a class="navbar-brand" href="index.html">Organizador de Tarefas</a>
    <div class="d-flex gap-3">
      <a href="index.html" class="nav-link" data-page="index.html">Quadro</a>
      <a href="usuarios.html" class="nav-link" data-page="usuarios.html">Usuários</a>
      <a href="tarefas.html" class="btn btn-sm btn-primary" data-page="tarefas.html">+ Nova Tarefa</a>
    </div>
  </nav>

  <div class="container-fluid p-4">
    <div class="row g-3">

      <div class="col-md-4">
        <div class="border rounded p-3">
          <h6 class="mb-3">Novo Usuário</h6>
          <form id="formUsuario" novalidate>
            <div class="mb-3">
              <label for="nome" class="form-label">Nome</label>
              <input type="text" id="nome" class="form-control" required minlength="2">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
          </form>
        </div>
      </div>

      <div class="col-md-8">
        <div class="border rounded p-3">
          <h6 class="mb-3">Usuários Cadastrados</h6>
          <table class="table table-sm table-bordered mb-0">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>E-mail</th>
              </tr>
            </thead>
            <tbody id="tabela-usuarios">
              <tr><td colspan="3" class="text-center text-muted">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
